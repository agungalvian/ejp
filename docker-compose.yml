version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_construction}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-erp_construction}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@db:5432/${POSTGRES_DB:-erp_construction}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3030}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5005:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5005/api}
    container_name: erp_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3030:80"

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
